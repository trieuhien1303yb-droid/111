name: Nuclei Stealth Scan

on:
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Nuclei Scan
      uses: projectdiscovery/nuclei-action@main
      with:
        target: "https://checkccv.kiwi/?action=home&category=5"
        # Chỉ quét các lỗi nghiêm trọng và phổ biến liên quan đến web/vulnerability
        tags: cve,sqli,lfi,xss,generic
        # Cấu hình ẩn mình và né Rate Limit
        flags: "-rate-limit 1 -bulk-size 1 -concurrency 1 -random-agent"
