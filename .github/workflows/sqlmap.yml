name: Decode Obfuscated Python

on:
  workflow_dispatch:

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode and extract source
        run: |
          python3 << 'EOF'
          import base64
          import zlib
          import re

          with open('stripe.py', 'r') as f:
              content = f.read()

          # Tìm chuỗi base64 bắt đầu bằng b' hoặc b"
          # Ưu tiên dấu nháy đơn trước
          match = re.search(r"b'([^']*)'", content)
          if not match:
              match = re.search(r'b"([^"]*)"', content)

          if not match:
              print("❌ Không tìm thấy chuỗi base64. Kiểm tra lại nội dung file.")
              # In ra 200 ký tự đầu để debug
              print("Nội dung file (đầu):", content[:200])
              exit(1)

          b64_str = match.group(1)
          print(f"✅ Đã tìm thấy base64, độ dài: {len(b64_str)}")

          # Giải mã
          compressed = base64.b64decode(b64_str)
          decompressed = zlib.decompress(compressed)
          source_code = decompressed.decode('utf-8')

          # Lưu ra file
          with open('decoded_stripe.py', 'w') as out:
              out.write(source_code)

          # In ra log để xem ngay
          print("\n" + "="*60)
          print("📜 MÃ NGUỒN SAU KHI GIẢI MÃ:")
          print("="*60)
          print(source_code)
          print("="*60)

          EOF

      - name: Upload decoded file
        uses: actions/upload-artifact@v4
        with:
          name: decoded-source
          path: decoded_stripe.py
