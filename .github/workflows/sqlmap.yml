name: Decode and Extract Payload

on:
  workflow_dispatch:

jobs:
  decode-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode obfuscated script
        run: |
          python3 << 'EOF'
          import base64
          import zlib
          import re

          with open('stripe.py', 'r') as f:
              data = f.read()

          match = re.search(r"b(['\"])(.*?)\\1", data, re.DOTALL)
          if not match:
              print("❌ Không tìm thấy chuỗi base64.")
              exit(1)

          b64_str = match.group(2)
          print(f"✅ Đã trích xuất chuỗi base64 (độ dài: {len(b64_str)})")

          compressed = base64.b64decode(b64_str)
          print(f"✅ Đã giải mã base64 (độ dài: {len(compressed)} bytes)")

          try:
              decompressed = zlib.decompress(compressed)
          except Exception as e:
              print(f"❌ Lỗi giải nén zlib: {e}")
              exit(1)

          try:
              source_code = decompressed.decode('utf-8')
          except UnicodeDecodeError:
              print("⚠️ Không decode được UTF-8, thử latin-1")
              source_code = decompressed.decode('latin-1')

          with open('decoded_source.py', 'w') as out:
              out.write(source_code)

          print("\n" + "="*60)
          print("📜 MÃ NGUỒN GỐC (DECODED):")
          print("="*60)
          print(source_code)
          print("="*60)
          EOF

      - name: Upload decoded source as artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoded-source
          path: decoded_source.py
