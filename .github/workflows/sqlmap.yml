name: Nuclei Stealth Scan

on:
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Nuclei Scan
      uses: projectdiscovery/nuclei-action@main
      with:
        target: "https://checkccv.kiwi/?action=home&category=5"
        tags: sqli,xss,lfi
        # Đưa các tham số thành các cấu hình riêng biệt để tránh lỗi exit code 2
        rate-limit: 1
        concurrency: 1
